<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zentrix-Dev logo">
  <defs>
    <linearGradient id="hexStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#00BFFF"/>
    </linearGradient>
    <linearGradient id="zFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background so it looks good as an avatar -->
  <rect width="120" height="120" rx="22" fill="#05070D"/>

  <!-- Outer hex -->
  <polygon points="60,6 108,33 108,87 60,114 12,87 12,33"
           fill="#0A0F1C" stroke="url(#hexStroke)" stroke-width="2.5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Inner hex -->
  <polygon points="60,14 100,37 100,83 60,106 20,83 20,37"
           fill="none" stroke="#1E90FF" stroke-width="0.75" stroke-opacity="0.35"/>

  <!-- Z mark -->
  <text x="60" y="79" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="52" font-weight="700" fill="url(#zFill)" filter="url(#glow)">Z</text>

  <!-- Pulsing center dot -->
  <circle cx="60" cy="60" r="3" fill="#38BDF8">
    <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
