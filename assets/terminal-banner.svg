<svg width="1000" height="280" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zentrix-Dev terminal banner">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="50%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#05070D"/>
    </linearGradient>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BFFF"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="glowDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dotGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1E293B" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="280" rx="18" fill="url(#bannerBg)"/>
  <rect width="1000" height="280" rx="18" fill="url(#dotGrid)" opacity="0.45"/>
  <rect x="1.5" y="1.5" width="997" height="277" rx="18" fill="none" stroke="url(#borderGlow)" stroke-width="1.5" opacity="0.75"/>

  <!-- Ambient glow -->
  <circle cx="160" cy="60" r="110" fill="url(#glowDot)"/>
  <circle cx="860" cy="220" r="130" fill="url(#glowDot)"/>

  <!-- Window dots -->
  <circle cx="34" cy="34" r="6" fill="#1E90FF"/>
  <circle cx="56" cy="34" r="6" fill="#3B82F6"/>
  <circle cx="78" cy="34" r="6" fill="#38BDF8"/>

  <!-- Terminal prompt line -->
  <text x="40" y="115" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="22" fill="#38BDF8" filter="url(#softGlow)">
    zentrixdev@linux<tspan fill="#7DD3FC">:</tspan><tspan fill="#3B82F6">~</tspan><tspan fill="#F1F5F9">$</tspan>
    <tspan fill="#E2E8F0"> whoami</tspan>
  </text>

  <!-- Name -->
  <text x="40" y="170" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="38" font-weight="700" fill="#E2E8F0" filter="url(#softGlow)">
    Zentrix<tspan fill="url(#zGrad)">Dev</tspan>
  </text>

  <!-- Tagline with animated cursor -->
  <text x="40" y="208" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="20" fill="#93C5FD">
    Building Modern Web Experiences<tspan fill="#38BDF8">_</tspan>
    <animate attributeName="opacity" values="1;1" dur="0.1s"/>
  </text>
  <rect x="432" y="194" width="11" height="22" fill="#38BDF8">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Divider -->
  <line x1="40" y1="230" x2="960" y2="230" stroke="#1E293B" stroke-width="1"/>

  <!-- Sub tagline -->
  <text x="40" y="255" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="14" fill="#475569">
    Frontend Developer  •  React  •  Next.js  •  TypeScript  •  UI/UX
  </text>

  <!-- Side glyph: hexagonal Z mark -->
  <g transform="translate(870, 130)">
    <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22"
             fill="none" stroke="url(#borderGlow)" stroke-width="2" opacity="0.85"/>
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
             fill="none" stroke="#1E90FF" stroke-width="0.75" opacity="0.45"/>
    <text x="0" y="12" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
          font-size="40" font-weight="700" fill="url(#zGrad)" filter="url(#softGlow)">Z</text>
  </g>
</svg>
