<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cyber grid background">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0F1B2E" stroke-width="1"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#020409" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020409" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="600" fill="#020409"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <rect width="1200" height="600" fill="url(#vignette)"/>

  <g>
    <circle cx="180" cy="120" r="3" fill="#38BDF8">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="120" r="14" fill="url(#dotGlow)"/>

    <circle cx="620" cy="90" r="3" fill="#1E90FF">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="90" r="14" fill="url(#dotGlow)"/>

    <circle cx="980" cy="220" r="3" fill="#3B82F6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="220" r="14" fill="url(#dotGlow)"/>

    <circle cx="320" cy="420" r="3" fill="#38BDF8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="420" r="14" fill="url(#dotGlow)"/>

    <circle cx="860" cy="480" r="3" fill="#00BFFF">
      <animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="480" r="14" fill="url(#dotGlow)"/>

    <circle cx="1050" cy="530" r="3" fill="#1E90FF">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="530" r="14" fill="url(#dotGlow)"/>
  </g>

  <line x1="180" y1="120" x2="620" y2="90" stroke="#1E90FF" stroke-width="0.5" opacity="0.25"/>
  <line x1="620" y1="90" x2="980" y2="220" stroke="#1E90FF" stroke-width="0.5" opacity="0.25"/>
  <line x1="320" y1="420" x2="860" y2="480" stroke="#1E90FF" stroke-width="0.5" opacity="0.25"/>
  <line x1="860" y1="480" x2="1050" y2="530" stroke="#1E90FF" stroke-width="0.5" opacity="0.25"/>
</svg>
