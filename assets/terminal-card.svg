<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="about me terminal card">
  <defs>
    <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#060A14"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#1E90FF" flood-opacity="0.28"/>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card body -->
  <rect x="10" y="10" width="880" height="460" rx="16" fill="#020409" filter="url(#cardShadow)"/>
  <rect x="10.75" y="10.75" width="878.5" height="458.5" rx="16" fill="none" stroke="url(#cardBorder)" stroke-width="1.5" opacity="0.8"/>

  <!-- Title bar -->
  <path d="M26,10 L874,10 Q890,10 890,26 L890,56 L10,56 L10,26 Q10,10 26,10 Z" fill="url(#titleBar)"/>
  <line x1="10" y1="56" x2="890" y2="56" stroke="#1E293B" stroke-width="1"/>
  <circle cx="42" cy="33" r="7" fill="#1E90FF"/>
  <circle cx="66" cy="33" r="7" fill="#3B82F6"/>
  <circle cx="90" cy="33" r="7" fill="#38BDF8"/>
  <text x="445" y="40" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="13" fill="#475569">~/about_me.sh</text>

  <!-- Body content -->
  <g font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="22" fill="#E2E8F0">
    <text x="40" y="110" filter="url(#textGlow)">
      <tspan fill="#38BDF8">zentrixdev@linux</tspan><tspan fill="#93C5FD">:</tspan><tspan fill="#3B82F6">~</tspan><tspan fill="#F1F5F9">$</tspan>
      <tspan fill="#E2E8F0"> cat about_me.txt</tspan>
    </text>

    <text x="40" y="160" fill="#38BDF8">&gt;</text>
    <text x="70" y="160">Frontend Developer</text>

    <text x="40" y="195" fill="#38BDF8">&gt;</text>
    <text x="70" y="195">React  •  Next.js  •  TypeScript</text>

    <text x="40" y="230" fill="#38BDF8">&gt;</text>
    <text x="70" y="230">UI/UX Enthusiast</text>

    <text x="40" y="265" fill="#38BDF8">&gt;</text>
    <text x="70" y="265">Open Source Learner</text>

    <text x="40" y="300" fill="#38BDF8">&gt;</text>
    <text x="70" y="300">Video Editor (visual storytelling)</text>

    <text x="40" y="335" fill="#38BDF8">&gt;</text>
    <text x="70" y="335">Currently learning Backend Development...</text>

    <text x="40" y="370" fill="#38BDF8">&gt;</text>
    <text x="70" y="370">Building modern, accessible web experiences.</text>

    <text x="40" y="430" filter="url(#textGlow)">
      <tspan fill="#38BDF8">zentrixdev@linux</tspan><tspan fill="#93C5FD">:</tspan><tspan fill="#3B82F6">~</tspan><tspan fill="#F1F5F9">$</tspan>
      <tspan fill="#38BDF8">&#9608;</tspan>
      <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
