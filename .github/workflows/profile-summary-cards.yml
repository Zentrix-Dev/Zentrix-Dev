name: Generate Profile Summary Cards

# Generates a set of themed profile-summary cards (stats, top-languages,
# repo count, etc.) and commits them to resources/profile-summary-cards/.
# Docs: https://github.com/vn7n24fzkq/github-profile-summary-cards
#
# Runs:
#   - once a day at 00:30 UTC (offset from snake.yml to spread load)
#   - manually via workflow_dispatch

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-summary-cards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          THEME: "tokyonight"
          # Excludes forked repos from stats for a cleaner signal.
          EXCLUDE: ""
          # Built-in UTC. Adjust if you want a different timezone.
          UTC_OFFSET: "0"

      - name: Commit generated cards
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile summary cards [skip ci]"
          file_pattern: "profile-summary-cards/*.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
